{% extends "base.html" %}

{% block title %}
<title>學生資料管理系統－新增資料</title>
<style>
    :root{
        --blue-main: #2563eb;
        --blue-dark: #1d4ed8;
        --blue-light: #dbeafe;
        --bg: #f8fbff;
        --text: #1e293b;
        --subtext: #64748b;
        --border: #dbe3ef;
        --white: #ffffff;
        --shadow: 0 8px 24px rgba(37, 99, 235, 0.08);
        --radius: 14px;
    }

    *{
        box-sizing: border-box;
    }

    body{
        margin: 0;
        padding: 0;
        background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
        color: var(--text);
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    .page-wrapper{
        max-width: 760px;
        margin: 40px auto;
        padding: 0 20px;
    }

    .card{
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px 28px;
    }

    h1, h3{
        text-align: center;
        margin: 0;
    }

    .title{
        font-size: 30px;
        color: var(--blue-dark);
        margin-bottom: 12px;
        letter-spacing: 1px;
    }

    .back-home{
        text-align: center;
        margin-bottom: 28px;
    }

    .back-home a{
        color: var(--blue-main);
        text-decoration: none;
        font-weight: 600;
        transition: 0.2s;
    }

    .back-home a:hover{
        color: var(--blue-dark);
        text-decoration: underline;
    }

    .form-table{
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 14px;
    }

    .form-table th{
        width: 120px;
        text-align: right;
        vertical-align: middle;
        padding-right: 14px;
        color: var(--blue-dark);
        font-size: 15px;
        font-weight: 700;
        white-space: nowrap;
    }

    .form-table td{
        vertical-align: middle;
    }

    .form-control{
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        font-size: 14px;
        color: var(--text);
        background: #fff;
        outline: none;
        transition: 0.2s;
    }

    .form-control:focus{
        border-color: var(--blue-main);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .radio-group{
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 10px 0;
        flex-wrap: wrap;
    }

    .radio-group label{
        margin-left: 4px;
        color: var(--text);
        font-size: 14px;
    }

    .button-group{
        text-align: center;
        padding-top: 12px;
    }

    .btn{
        display: inline-block;
        min-width: 100px;
        padding: 11px 18px;
        margin: 0 6px;
        border: none;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn-submit{
        background: var(--blue-main);
        color: white;
    }

    .btn-submit:hover{
        background: var(--blue-dark);
    }

    .btn-reset{
        background: #e2e8f0;
        color: #334155;
    }

    .btn-reset:hover{
        background: #cbd5e1;
    }

    .required{
        color: #ef4444;
        margin-right: 4px;
    }

    .hint{
        text-align: center;
        color: var(--subtext);
        font-size: 14px;
        margin-top: 18px;
    }

    @media (max-width: 768px){
        .page-wrapper{
            margin: 24px auto;
        }

        .card{
            padding: 24px 18px;
        }

        .title{
            font-size: 24px;
            line-height: 1.5;
        }

        .form-table,
        .form-table tbody,
        .form-table tr,
        .form-table th,
        .form-table td{
            display: block;
            width: 100%;
        }

        .form-table tr{
            margin-bottom: 14px;
        }

        .form-table th{
            text-align: left;
            padding-right: 0;
            margin-bottom: 8px;
        }

        .button-group .btn{
            width: 100%;
            margin: 6px 0;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="card">
        <div>
            <h1 class="title">學生資料管理系統－新增資料</h1>
            <div class="back-home">
                <a href="{% url 'index' %}">← 回首頁</a>
            </div>
        </div>

        <div>
            <form action="{% url 'post' %}" method="post">
                {% csrf_token %}
                <table class="form-table">
                    <tr>
                        <th><span class="required">*</span>姓名</th>
                        <td>
                            <input type="text" id="cname" name="cname" class="form-control" required placeholder="請輸入姓名">
                        </td>
                    </tr>

                    <tr>
                        <th><span class="required">*</span>性別</th>
                        <td>
                            <div class="radio-group">
                                <div>
                                    <input type="radio" id="csex_m" name="csex" value="M" checked>
                                    <label for="csex_m">男</label>
                                </div>
                                <div>
                                    <input type="radio" id="csex_f" name="csex" value="F">
                                    <label for="csex_f">女</label>
                                </div>
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <th><span class="required">*</span>生日</th>
                        <td>
                            <input type="date" id="cbirthday" name="cbirthday" class="form-control" required>
                        </td>
                    </tr>

                    <tr>
                        <th><span class="required">*</span>信箱</th>
                        <td>
                            <input type="email" id="cemail" name="cemail" class="form-control" required placeholder="請輸入 Email">
                        </td>
                    </tr>

                    <tr>
                        <th>電話</th>
                        <td>
                            <input type="text" id="cphone" name="cphone" class="form-control" placeholder="請輸入電話">
                        </td>
                    </tr>

                    <tr>
                        <th>地址</th>
                        <td>
                            <input type="text" id="caddr" name="caddr" class="form-control" placeholder="請輸入地址">
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2" class="button-group">
                            <input type="submit" name="submitButton" value="儲存" class="btn btn-submit">
                            <input type="reset" name="resetButton" value="重置" class="btn btn-reset">
                        </td>
                    </tr>
                </table>
            </form>

            <div class="hint">＊為必填欄位</div>
        </div>
    </div>
</div>
{% endblock %}
